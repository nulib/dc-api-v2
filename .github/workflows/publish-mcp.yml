name: Create and publish MCP package and container image
on:
  push:
    tags:
      - "v*"
permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nulib/dc-api-mcp
jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"
      - run: npm ci
        working-directory: ./mcp
      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: ./mcp
  publish-oci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=dc-api-mcp
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}/tree/main/mcp
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}/tree/main/mcp
            org.opencontainers.image.licenses=MIT
      - name: Build and push the Docker image
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: ./mcp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true
  publish-registry:
    needs:
      - publish-npm
      - publish-oci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
        working-directory: ${{ runner.temp }}
      - name: Authenticate to MCP Registry
        run: ${{ runner.temp }}/mcp-publisher login github-oidc
      - name: Publish server to MCP Registry
        run: ${{ runner.temp }}/mcp-publisher publish
        working-directory: ./mcp
